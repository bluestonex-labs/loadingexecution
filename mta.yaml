_schema-version: "3.2"
ID: loadingexecution
version: 0.0.1
modules:
- name: loadingexecution-destination-content
  type: com.sap.application.content
  requires:
  - name: loadingexecution-destination-service
    parameters:
      content-target: true
  - name: loadingexecution_html_repo_host
    parameters:
      service-key:
        name: loadingexecution_html_repo_host-key
  - name: uaa_loadingexecution
    parameters:
      service-key:
        name: uaa_loadingexecution-key
  parameters:
    content:
      instance:
        destinations:
        - Name: LoadingExecution_loadingexecution_html_repo_host
          ServiceInstanceName: loadingexecution-html5-app-host-service
          ServiceKeyName: loadingexecution_html_repo_host-key
          sap.cloud.service: LoadingExecution
        - Authentication: OAuth2UserTokenExchange
          Name: LoadingExecution_uaa_loadingexecution
          ServiceInstanceName: loadingexecution-xsuaa-service
          ServiceKeyName: uaa_loadingexecution-key
          sap.cloud.service: LoadingExecution
        existing_destinations_policy: ignore
  build-parameters:
    no-source: true
- name: loadingexecution-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: loadingexecution_html_repo_host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - comsyscowmloadexecutionui.zip
      name: comsyscowmloadexecutionui
      target-path: resources/
- name: comsyscowmloadexecutionui
  type: html5
  path: loadexecutionui
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: loadingexecution-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: loadingexecution-destination-service
    service-plan: lite
- name: loadingexecution_html_repo_host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: loadingexecution-html5-app-host-service
    service-plan: app-host
- name: uaa_loadingexecution
  type: org.cloudfoundry.managed-service
  parameters:
    path: ./xs-security.json
    service: xsuaa
    service-name: loadingexecution-xsuaa-service
    service-plan: application
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
